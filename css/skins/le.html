<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Page with Modal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .section-title {
      text-align: center;
      margin-bottom: 20px;
    }
    .padd-15 {
      padding: 15px;
    }
    .contact-info-item {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .contact-info-item .icon {
      margin-right: 10px;
    }
    .form-item {
      margin-bottom: 15px;
    }
    .form-control {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      border-radius: 5px;
    }
    .btn:hover {
      background: #0056b3;
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }
    .modal-box {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      z-index: 2;
      text-align: center;
    }
    .modal-box.active,
    .overlay.active {
      display: block;
    }
    .buttons button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      border-radius: 5px;
    }
    .buttons button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <section class="contact section" id="contact">
    <div class="container">
      <div class="row">
        <div class="section-title padd-15">
          <h2>Contact Me</h2>
        </div>
      </div>
      <h3 class="contact-title padd-15">Have You Any Questions?</h3>
      <h4 class="contact-sub-title padd-15">I'M AT YOUR SERVICE</h4>
      <div class="row">
        <!-- ====== Contact information item start =====-->
        <div class="contact-info-item padd-15">
          <div class="icon"><i class="fa fa-phone"></i></div>
          <h4>Call Us On</h4>
          <p>+91 6266773071</p>
        </div>
        <!-- ====== Contact information item End =====-->
        <!-- ====== Contact information item start =====-->
        <div class="contact-info-item padd-15">
          <div class="icon"><i class="fa fa-map-marker-alt"></i></div>
          <h4>Office</h4>
          <p>Chhattisgarh</p>
        </div>
        <!-- ====== Contact information item End =====-->
        <!-- ====== Contact information item start =====-->
        <div class="contact-info-item padd-15">
          <div class="icon"><i class="fa fa-envelope"></i></div>
          <h4>Email</h4>
          <p>shiv23042005@gmail.com</p>
        </div>
        <!-- ====== Contact information item End =====-->
        <!-- ====== Contact information item start =====-->
        <div class="contact-info-item padd-15">
          <div class="icon"><i class="fa fa-globe-europe"></i></div>
          <h4>Website</h4>
          <p>github.shivam.com</p>
        </div>
        <!-- ====== Contact information item End =====-->
      </div>
      <h3 class="contact-title padd-15">SEND ME AN EMAIL</h3>
      <h4 class="contact-sub-title padd-15">I'M VERY RESPONSIVE TO MESSAGES</h4>
      <!-- ====== Contact Form ======-->
      <div class="row">
        <div class="contact-form padd-15">
          <form action="javascript:void(0);" method="post" id="contactForm">
            <div class="row">
              <div class="form-item col-6 padd-15">
                <div class="form-group">
                  <input type="text" class="form-control" name="name" placeholder="Name" required>
                </div>
              </div>
              <div class="form-item col-6 padd-15">
                <div class="form-group">
                  <input type="email" class="form-control" name="email" placeholder="Email" required>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="form-item col-12 padd-15">
                <div class="form-group">
                  <input type="text" class="form-control" name="subject" placeholder="Subject" required>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="form-item col-12 padd-15">
                <div class="form-group">
                  <textarea name="message" class="form-control" id="message" placeholder="Message" required></textarea>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="form-item col-12 padd-15">
                <button type="submit" class="btn show-modal">Send Message</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <span class="overlay"></span>
  <div class="modal-box">
    <i class="fa-regular fa-circle-check"></i>
    <h2>Submitted</h2>
    <h3>You have successfully submitted the feedback.</h3>
    <div class="buttons">
      <button class="close-btn">Ok, Close</button>
      <button class="show-modal">One more</button>
    </div>
  </div>

  <script>
    const section = document.querySelector("section"),
      overlay = document.querySelector(".overlay"),
      showBtns = document.querySelectorAll(".show-modal"),
      closeBtn = document.querySelector(".close-btn"),
      modalBox = document.querySelector(".modal-box"),
      form = document.getElementById("contactForm");

    showBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        overlay.classList.add("active");
        modalBox.classList.add("active");
      });
    });

    overlay.addEventListener("click", () => {
      overlay.classList.remove("active");
      modalBox.classList.remove("active");
    });

    closeBtn.addEventListener("click", () => {
      overlay.classList.remove("active");
      modalBox.classList.remove("active");
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      overlay.classList.add("active");
      modalBox.classList.add("active");
    });
  </script>
</body>
</html>
